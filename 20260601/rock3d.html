<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>3D 岩石互動</title>

<script src="https://cdn.jsdelivr.net/npm/aframe@1.4.2/dist/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:"Noto Sans TC", Arial, sans-serif;
}

#back{
  position:fixed;
  top:15px;
  left:15px;
  z-index:999;
  background:rgba(0,0,0,.75);
  color:white;
  padding:12px 18px;
  border-radius:14px;
  text-decoration:none;
  font-size:18px;
}

#hint{
  position:fixed;
  bottom:18px;
  left:50%;
  transform:translateX(-50%);
  z-index:999;
  background:rgba(0,0,0,.72);
  color:white;
  padding:14px 20px;
  border-radius:16px;
  font-size:15px;
  text-align:center;
  line-height:1.8;
}

#bgmFrame{
  position:fixed;
  width:0;
  height:0;
  border:none;
  opacity:0;
  pointer-events:none;
}
</style>

<script>
AFRAME.registerComponent("gesture-handler", {
  init:function(){

    const el = this.el;

    let scale = 0.45;
    let rotationY = 0;

    let lastDistance = null;
    let lastAngle = null;

    const minScale = 0.2;
    const maxScale = 1.5;

    function getDistance(t1,t2){
      const dx = t1.clientX - t2.clientX;
      const dy = t1.clientY - t2.clientY;
      return Math.sqrt(dx * dx + dy * dy);
    }

    function getAngle(t1,t2){
      return Math.atan2(
        t2.clientY - t1.clientY,
        t2.clientX - t1.clientX
      );
    }

    window.addEventListener("touchstart", function(e){

      if(e.touches.length === 2){
        lastDistance = getDistance(e.touches[0], e.touches[1]);
        lastAngle = getAngle(e.touches[0], e.touches[1]);
      }

    }, {passive:false});

    window.addEventListener("touchmove", function(e){

      if(e.touches.length === 2){

        e.preventDefault();

        const newDistance = getDistance(e.touches[0], e.touches[1]);
        const newAngle = getAngle(e.touches[0], e.touches[1]);

        if(lastDistance){
          const scaleChange = newDistance / lastDistance;
          scale = scale * scaleChange;
          scale = Math.max(minScale, Math.min(maxScale, scale));

          el.setAttribute("scale", `${scale} ${scale} ${scale}`);
        }

        if(lastAngle !== null){
          const angleChange = newAngle - lastAngle;
          rotationY += angleChange * 80;

          el.setAttribute("rotation", `0 ${rotationY} 0`);
        }

        lastDistance = newDistance;
        lastAngle = newAngle;
      }

    }, {passive:false});

    window.addEventListener("touchend", function(){
      lastDistance = null;
      lastAngle = null;
    });

    window.addEventListener("wheel", function(e){

      e.preventDefault();

      if(e.deltaY < 0){
        scale += 0.05;
      }else{
        scale -= 0.05;
      }

      scale = Math.max(minScale, Math.min(maxScale, scale));

      el.setAttribute("scale", `${scale} ${scale} ${scale}`);

    }, {passive:false});

    window.addEventListener("dblclick", function(){

      scale = 0.45;
      rotationY = 0;

      el.setAttribute("scale", "0.45 0.45 0.45");
      el.setAttribute("rotation", "0 0 0");

    });
  }
});
</script>
</head>

<body>

<iframe src="bgm.html" allow="autoplay" id="bgmFrame"></iframe>

<a id="back" href="finalexam.html">返回地圖</a>

<div id="hint">
請掃描 interactive 圖片<br>
雙指拉合縮放｜雙指旋轉｜雙擊歸位
</div>

<a-scene
mindar-image="
imageTargetSrc: interactive.mind;
autoStart:true;
uiScanning:true;
uiLoading:true;
uiError:true;
"
color-space="sRGB"
renderer="
colorManagement:true;
physicallyCorrectLights:true;
antialias:true;
alpha:true;
"
vr-mode-ui="enabled:false"
device-orientation-permission-ui="enabled:false">

<a-assets>
  <a-asset-item id="rockObj" src="Rock1.obj"></a-asset-item>
  <a-asset-item id="rockMtl" src="Rock1.mtl"></a-asset-item>
</a-assets>

<a-light type="ambient" intensity="1.2"></a-light>

<a-light
  type="directional"
  intensity="1.5"
  position="1 2 1">
</a-light>

<a-camera
  position="0 0 0"
  look-controls="enabled:false">
</a-camera>

<a-entity mindar-image-target="targetIndex:0">

  <a-plane
    position="0 -0.9 0"
    width="2.7"
    height="0.6"
    color="#111111"
    opacity="0.85"
    material="shader: flat">
  </a-plane>

  <a-text
    value="3D 岩石互動模型"
    position="0 -0.76 0.02"
    align="center"
    color="#FFD54F"
    width="3">
  </a-text>

  <a-text
    value="雙指拉合縮放｜雙指旋轉｜雙擊歸位"
    position="0 -1.0 0.02"
    align="center"
    color="#FFFFFF"
    width="2.4">
  </a-text>

  <a-entity
    id="rockModel"
    obj-model="obj: #rockObj; mtl: #rockMtl"
    position="0 0.15 0"
    rotation="0 0 0"
    scale="0.45 0.45 0.45"
    gesture-handler>
  </a-entity>

</a-entity>

</a-scene>

</body>
</html>
